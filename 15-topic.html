<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>质量经理手册 · Day 15：认证认可（高频）</title>
<style>
:root{--bg:#f0f4ff;--paper:#fff;--ink:#1a2332;--muted:#5a6a7e;--line:#dce3f0;--blue:#2563eb;--cyan:#0ea5e9;--green:#16a34a;--orange:#f59e0b;--red:#ef4444;--purple:#7c3aed;--pink:#d63384;--radius:10px;--max:1200px}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.7}
.topbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.topbar-inner{max-width:var(--max);margin:0 auto;padding:12px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--blue),var(--cyan));display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;font-weight:700}
.brand-title{font-size:15px;font-weight:700;color:var(--ink)}
.brand-sub{font-size:12px;color:var(--muted);margin-left:6px}
.main-layout{max-width:820px;margin:0 auto;padding:16px 28px 64px}
.quiz-section{background:var(--paper);border-radius:var(--radius);padding:24px 28px;margin-bottom:16px;box-shadow:0 4px 20px rgba(37,99,235,.04)}
.quiz-section .quiz-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:4px}
.quiz-section h2{font-size:18px;font-weight:700;color:var(--pink);margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #fce7f3}
.question{background:#fafbff;border:1px solid #e2e8f0;border-radius:8px;padding:16px;margin-bottom:14px}
.question-header{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:10px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;margin-left:6px;vertical-align:middle}
.badge-multi{background:#fce7f3;color:var(--pink)}
.badge-single{background:#dcfce7;color:var(--green)}
.option-label{display:flex;align-items:flex-start;padding:7px 0;cursor:pointer;font-size:14px;color:#334155}
.option-label input{margin-top:3px;margin-right:10px;accent-color:var(--blue);width:16px;height:16px;flex-shrink:0}
.submit-wrap{text-align:center;margin:20px 0}
.submit-btn{background:linear-gradient(135deg,var(--blue),#1d4ed8);color:#fff;border:none;border-radius:24px;padding:12px 48px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity .2s}
.submit-btn:hover{opacity:.9}
.result{display:none;margin-top:20px}
.score-bar{background:linear-gradient(135deg,var(--blue),var(--green));color:#fff;text-align:center;padding:16px;border-radius:10px;margin-bottom:16px;font-size:22px;font-weight:700}
.result-card{border-radius:10px;padding:16px;margin-bottom:12px;font-size:14px}
.result-correct{background:#dcfce7;border:1px solid #86efac}
.result-wrong{background:#fee2e2;border:1px solid #fca5a5}
.footer{text-align:center;padding:20px;font-size:12px;color:#94a3b8}
.footer .sign{font-size:13px;color:#64748b;margin-top:6px}
</style>
</head>
<body>

<header class="topbar">
<div class="topbar-inner">
<a class="brand" href="#">
<div class="brand-mark">质</div>
<span><span class="brand-title">质量经理手册</span><span class="brand-sub">Day 15：认证认可（高频）</span></span>
</a>
</div>
</header>

<main class="main-layout">
<section class="quiz-section">
<div class="quiz-title">练习题</div>
<h2>Day 15：认证认可（高频）（5道题）</h2>

<div class="question" data-id="q0" data-answer="B" data-type="single">
<div class="question-header">第1题：第三方体系认证属于？<span class="badge badge-single">单选</span></div>
<label class="option-label"><input type="radio" name="q0" value="A"><span>A. 合规评价</span></label>
<label class="option-label"><input type="radio" name="q0" value="B"><span>B. 符合性评价</span></label>
<label class="option-label"><input type="radio" name="q0" value="C"><span>C. 成熟度评定</span></label>
<label class="option-label"><input type="radio" name="q0" value="D"><span>D. 资格考核</span></label>
</div>

<div class="question" data-id="q1" data-answer="B" data-type="single">
<div class="question-header">第2题：产品认证与体系认证的主要区别是？<span class="badge badge-single">单选</span></div>
<label class="option-label"><input type="radio" name="q1" value="A"><span>A. 产品认证针对体系，体系认证针对产品</span></label>
<label class="option-label"><input type="radio" name="q1" value="B"><span>B. 产品认证针对特定产品，体系认证针对管理体系</span></label>
<label class="option-label"><input type="radio" name="q1" value="C"><span>C. 两者完全相同</span></label>
<label class="option-label"><input type="radio" name="q1" value="D"><span>D. 产品认证是自愿的，体系认证是强制的</span></label>
</div>

<div class="question" data-id="q2" data-answer="A" data-type="single">
<div class="question-header">第3题：认证标志可用于产品的是？<span class="badge badge-single">单选</span></div>
<label class="option-label"><input type="radio" name="q2" value="A"><span>A. 产品认证</span></label>
<label class="option-label"><input type="radio" name="q2" value="B"><span>B. 体系认证</span></label>
<label class="option-label"><input type="radio" name="q2" value="C"><span>C. 两者都可以</span></label>
<label class="option-label"><input type="radio" name="q2" value="D"><span>D. 两者都不可以</span></label>
</div>

<div class="question" data-id="q3" data-answer="AB" data-type="single">
<div class="question-header">第4题：以下属于强制性认证的有？<span class="badge badge-single">单选</span></div>
<label class="option-label"><input type="radio" name="q3" value="A"><span>A. 3C认证</span></label>
<label class="option-label"><input type="radio" name="q3" value="B"><span>B. 中国强制性产品认证</span></label>
<label class="option-label"><input type="radio" name="q3" value="C"><span>C. 节能认证</span></label>
<label class="option-label"><input type="radio" name="q3" value="D"><span>D. ISO 9001认证</span></label>
</div>

<div class="question" data-id="q4" data-answer="AB" data-type="multi">
<div class="question-header">第5题：以下属于强制性认证的有？<span class="badge badge-multi">多选</span></div>
<label class="option-label"><input type="checkbox" name="q4" value="A"><span>A. 3C认证</span></label>
<label class="option-label"><input type="checkbox" name="q4" value="B"><span>B. 中国强制性产品认证</span></label>
<label class="option-label"><input type="checkbox" name="q4" value="C"><span>C. 节能认证</span></label>
<label class="option-label"><input type="checkbox" name="q4" value="D"><span>D. ISO 9001认证</span></label>
</div>



<div class="submit-wrap"><button class="submit-btn" onclick="submitQuiz()">提交答案</button></div>
<div class="result" id="result"><div class="score-bar" id="scoreBar"></div><div id="resultDetails"></div></div>
</section>
</main>

<footer class="footer">
<p>© 质量经理手册互动练习</p>
<div class="sign">⚡ 与你同行 AI 浪潮，打造智能工作新范式</div>
</footer>

<script>
var explanations=q0:"第三方体系认证属于符合性评价，不是成熟度评定。成熟度评定是卓越绩效模式的评价方式。",
q1:"产品认证针对特定产品，体系认证针对管理体系。这是两者的主要区别。",
q2:"产品认证的标志可用于产品上，体系认证的标志不能用于产品上，只能用于宣传。",
q3:"3C认证（中国强制性产品认证）属于强制性认证。节能认证属于自愿性产品认证。ISO 9001认证属于体系认证，通常是自愿的。",
q4:"3C认证（中国强制性产品认证）属于强制性认证。节能认证属于自愿性产品认证。ISO 9001认证属于体系认证，通常是自愿的。",
q5:"1. **体系建立**：\n   - 学习ISO 9001标准要求\n   - 进行现状诊断\n   - 建立质量管理体系\n   - 编制体系文件（手册、程序、作业指导书）\n\n2. **体系运行**：\n   - 体系文件发布实施\n   - 全员培训\n   - 运行3个月以上\n\n3. **内部审核**：\n   - 培训内审员\n   - 实施内部审核\n   - 整改不符合项\n\n4. **管理评审**：\n   - 最高管理者主持\n   - 评价体系有效性\n   - 形成评审输出\n\n5. **认证申请**：\n   - 选择认证机构\n   - 提交认证申请\n   - 签订合同\n\n6. **认证审核**：\n   - 第一阶段审核（文件审核）\n   - 第二阶段审核（现场审核）\n   - 整改不符合项\n   - 获得认证证书\n\n7. **监督审核**：\n   - 每年一次监督审核\n   - 三年复评";
var questions=[QUESTIONS_JS];
function submitQuiz(){let score=0,html='';questions.forEach((q,idx)=>{const box=document.querySelector('.question[data-id="'+q.id+'"]');const correct=box.getAttribute('data-answer');const checked=[...box.querySelectorAll('input:checked')].map(x=>x.value).join('');const ok=checked===correct;if(ok)score++;html+='<div class="result-card '+(ok?'result-correct':'result-wrong')+'">';html+='<div style="font-weight:600;margin-bottom:6px">'+(ok?'✅':'❌')+' 第'+(idx+1)+'题：'+q.text+'</div>';if(!ok)html+='<div>你的答案：<span style="color:#ef4444">'+(checked||'未作答')+'</span> | 正确答案：<span style="color:#16a34a;font-weight:600">'+correct+'</span></div>';else html+='<div>答案：<span style="color:#16a34a;font-weight:600">'+correct+'</span> ✅</div>';html+='<div style="margin-top:6px;color:#555;font-size:13px">'+explanations[q.id]+'</div></div>';});document.getElementById('scoreBar').textContent='得分：'+score+' / '+questions.length+(score===questions.length?' 🎉 满分！':'');document.getElementById('resultDetails').innerHTML=html;document.getElementById('result').style.display='block';document.getElementById('result').scrollIntoView({behavior:'smooth'});document.querySelector('.submit-btn').textContent='已提交';document.querySelector('.submit-btn').disabled=true;document.querySelector('.submit-btn').style.opacity='0.6';document.querySelectorAll('.question input').forEach(inp=>inp.disabled=true)}
</script>
</body>
</html>
