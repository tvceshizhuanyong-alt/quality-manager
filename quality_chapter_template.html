<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}}</title>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif;background:#f6faff;color:#152033;line-height:1.65}
    .topbar{position:sticky;top:0;background:rgba(246,250,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid #dbe7f4;z-index:10}
    .wrap{max-width:1080px;margin:0 auto;padding:18px 22px}
    .hero{display:grid;grid-template-columns:1.2fr .8fr;gap:22px;padding:42px 0}
    .panel{background:#fff;border:1px solid #dbe7f4;border-radius:10px;box-shadow:0 14px 34px rgba(39,72,114,.08);padding:24px}
    h1{margin:0;font-size:clamp(34px,5vw,58px);line-height:1.05}
    h2{margin:0 0 12px;font-size:28px}
    h3{margin:24px 0 10px;font-size:20px}
    p,li{color:#304059}
    .lead{font-size:18px;color:#405066;margin-top:18px}
    .tag{display:inline-block;padding:3px 10px;border-radius:999px;background:#eaf2ff;color:#246bfe;font-size:12px;font-weight:700;margin:0 6px 6px 0}
    .cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .card{border:1px solid #e1ebf7;border-radius:10px;padding:16px;background:#fbfdff}
    .quiz-section{margin-top:18px}
    .question{background:#fafbfc;border:1px solid #e5e6eb;border-radius:8px;padding:16px;margin-bottom:14px}
    .option-label{display:flex;align-items:flex-start;padding:6px 0;cursor:pointer;font-size:14px}
    .option-label input{margin-top:3px;margin-right:10px;accent-color:#2b6aff;width:16px;height:16px;flex-shrink:0}
    .submit-btn{background:linear-gradient(135deg,#2b6aff,#1a52d6);color:#fff;border:none;border-radius:24px;padding:12px 36px;font-size:16px;font-weight:700;cursor:pointer}
    .result{display:none;margin-top:20px}
    .score-bar{background:linear-gradient(135deg,#2b6aff,#4caf50);color:#fff;text-align:center;padding:16px;border-radius:10px;margin-bottom:16px;font-size:22px;font-weight:700}
    .result-card{border-radius:10px;padding:16px;margin-bottom:12px;font-size:14px}
    .result-correct{background:#e8f5e9;border:1px solid #a5d6a7}
    .result-wrong{background:#fce4ec;border:1px solid #ef9a9a}
    .footer{text-align:center;padding:18px 0 30px;color:#8893a7;font-size:12px}
    .keyword{display:inline-block;padding:1px 7px 2px;margin:0 1px;border-radius:7px;background:#eaf2ff;color:#246bfe;font-weight:800}
    .keyword.green{background:#e7f7ef;color:#159a63}
    .keyword.orange{background:#fff0dc;color:#f08a24}
    .keyword.purple{background:#f0edff;color:#7657d8}
    @media (max-width: 860px){.hero,.cards{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="topbar"><div class="wrap"><strong>{{TITLE}}</strong></div></div>
<div class="wrap">
  <section class="hero">
    <div class="panel">
      <h1>{{H1}}</h1>
      <p class="lead">{{LEAD}}</p>
      <div style="margin-top:16px">{{TAGS}}</div>
    </div>
    <div class="panel">
      <h2>本页速览</h2>
      <ul>
        {{OVERVIEW_ITEMS}}
      </ul>
    </div>
  </section>

  <section class="panel">
    <h2>知识点精讲</h2>
    {{CONTENT_BLOCKS}}
  </section>

  <section class="panel quiz-section" id="quiz">
    <h2>互动练习题（5道）</h2>
    {{QUIZ_BLOCKS}}
    <div style="text-align:center;margin:20px 0"><button class="submit-btn" onclick="submitQuiz()">提交答案</button></div>
    <div class="result" id="result"><div class="score-bar" id="scoreBar"></div><div id="resultDetails"></div></div>
  </section>

  <div class="footer">与你同行 AI 浪潮，打造智能工作新范式</div>
</div>
<script>
const explanations = {{EXPLANATIONS}};
const questions = {{QUESTIONS}};
function submitQuiz(){let score=0,html='';questions.forEach((q,idx)=>{const box=document.querySelector('.question[data-id="'+q.id+'"]');const correct=box.getAttribute('data-answer');const checked=[...box.querySelectorAll('input:checked')].map(x=>x.value).join('');const ok=checked===correct;if(ok)score++;html+='<div class="result-card '+(ok?'result-correct':'result-wrong')+'">';html+='<div><b>'+(ok?'✅':'❌')+' 第'+(idx+1)+'题：'+q.text+'</b></div>';if(!ok)html+='<div>你的答案：<span style="color:#d32f2f">'+(checked||'未作答')+'</span> | 正确答案：<span style="color:#2e7d32">'+correct+'</span></div>';else html+='<div>答案：<span style="color:#2e7d32">'+correct+'</span> ✅</div>';html+='<div style="margin-top:6px;color:#555">'+explanations[q.id]+'</div></div>';});document.getElementById('scoreBar').textContent='得分：'+score+' / '+questions.length+(score===questions.length?' 满分！':'');document.getElementById('resultDetails').innerHTML=html;document.getElementById('result').style.display='block';document.getElementById('result').scrollIntoView({behavior:'smooth'});document.querySelector('.submit-btn').disabled=true;document.querySelector('.submit-btn').style.opacity='0.6';document.querySelectorAll('.question input').forEach(inp=>inp.disabled=true)}
</script>
</body>
</html>
